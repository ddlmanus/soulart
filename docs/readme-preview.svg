  <text x="72" y="236" fill="#334155" font-size="20" font-family="Inter, Segoe UI, Arial">Public baseline with hero and scope cards</text>
  <rect x="72" y="266" width="168" height="40" rx="20" fill="#0f766e"/>
  <text x="156" y="292" text-anchor="middle" fill="#ffffff" font-size="18" font-family="Inter, Segoe UI, Arial" font-weight="700">Open Scope</text>

  <rect x="660" y="152" width="580" height="260" rx="18" fill="#ffffff" stroke="#d1fae5"/>
  <text x="692" y="200" fill="#0f172a" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Public Pages</text>
