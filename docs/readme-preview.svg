  <text x="114" y="85" fill="#0f172a" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Soulart Open · README Preview</text>

  <rect x="40" y="152" width="580" height="260" rx="18" fill="#ffffff" stroke="#d1fae5"/>
