  <text x="72" y="178" fill="#f8fafc" font-size="68" font-family="Inter, Segoe UI, Arial" font-weight="800">Soulart Open</text>
  <text x="72" y="222" fill="#bae6fd" font-size="25" font-family="Inter, Segoe UI, Arial" font-weight="500">AI Design Product Baseline · Public Edition</text>

  <g transform="translate(72,258)">
